<title>Gallery - Dream Homes Realty</title>

<style>
:root{
  --bg:#f4f4f4;
  --card:#ffffff;
  --text:#000;
  --btn:#333;
  --imgbg:#eeeeee;
}

body.dark{
  --bg:#111;
  --card:#1e1e1e;
  --text:#fff;
  --btn:#555;
  --imgbg:#222;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* HEADER */
header{
  background:#333;
  color:#fff;
  padding:20px;
  text-align:center;
  position:relative;
}

.toggle{
  position:absolute;
  right:20px;
  top:20px;
  padding:8px 14px;
  cursor:pointer;
  border:none;
  border-radius:5px;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:16px;
  padding:20px;
}

.gallery-item{
  background:var(--card);
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
  transform:translateY(20px);
  opacity:0;
  animation:fadeUp .6s forwards;
}

.gallery-item:hover{
  transform:scale(1.03);
}

.gallery-item img{
  width:100%;
  height:220px;
  object-fit:contain;   /* OPTION A: NO CROPPING */
  background:var(--imgbg);
  cursor:pointer;
}

.info{
  padding:10px;
  text-align:center;
}

.place-label{
  font-weight:bold;
  margin-bottom:8px;
}

.download-btn{
  padding:8px 14px;
  background:var(--btn);
  color:#fff;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* MODAL (ZOOM) */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#modal img{
  max-width:90%;
  max-height:85%;
  border-radius:8px;
}

#close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:35px;
  color:#fff;
  cursor:pointer;
}

/* VIDEO */
.video-container{
  width:500px;
  margin:40px auto;
  position:relative;
}

.video-container video{
  width:100%;
  border-radius:8px;
}

.video-container a{
  position:absolute;
  bottom:10px;
  right:10px;
  background:rgba(0,0,0,.7);
  color:#fff;
  padding:8px 12px;
  text-decoration:none;
  border-radius:4px;
}
</style>
</head>
